databaseChangeLog:
  - changeSet:
      id: 001-create-wallet
      author: me
      changes:
        - createTable:
            tableName: wallet
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: balance
                  type: numeric(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addCheckConstraint:
            tableName: wallet
            constraintName: wallet_balance_positive
            constraintBody: (balance >= 0)